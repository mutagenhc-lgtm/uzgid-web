<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UzGid — your guide to Uzbekistan</title>
<style>
  :root{
    --cobalt:#15356b;
    --cobalt-deep:#0e2548;
    --turq:#1f8f93;
    --turq-light:#3bb3a8;
    --sand:#f4ecd8;
    --sand-deep:#e9dcc0;
    --clay:#c0633a;
    --gold:#cfa24c;
    --ink:#22201b;
    --ink-soft:#5b554a;
    --paper:#fbf6ea;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--sand);
    color:var(--ink);
    overflow:hidden;
  }
  #app{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto;position:relative;background:var(--paper)}

  /* ---------- shared girih motif ---------- */
  .girih{position:absolute;opacity:.07;pointer-events:none}

  /* ---------- language screen ---------- */
  #lang-screen{
    flex:1;display:flex;flex-direction:column;
    background:var(--cobalt);color:var(--sand);
    position:relative;overflow:hidden;
  }
  #lang-screen .top{padding:54px 28px 10px;position:relative;z-index:2}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
  .brand-star{width:38px;height:38px;flex-shrink:0}
  .brand-name{font-size:25px;font-weight:700;letter-spacing:.5px}
  .brand-name span{color:var(--gold)}
  .lede{font-size:30px;line-height:1.25;font-weight:600;max-width:11ch}
  .lede em{font-style:normal;color:var(--turq-light)}
  .sub{margin-top:14px;font-size:15px;line-height:1.6;color:#cdd8ea;max-width:30ch}
  .pick{margin-top:26px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}
  .langs{
    position:relative;z-index:2;
    padding:14px 22px 30px;
    display:grid;grid-template-columns:1fr 1fr;gap:11px;
    overflow-y:auto;
  }
  .lang-btn{
    display:flex;align-items:center;gap:11px;
    background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.16);
    border-radius:14px;padding:14px 15px;
    color:var(--sand);font-size:15.5px;font-weight:500;
    cursor:pointer;transition:.18s;
  }
  .lang-btn:hover,.lang-btn:active{background:var(--turq);border-color:var(--turq-light)}
  .lang-btn .flag{font-size:22px}

  /* ---------- chat screen ---------- */
  #chat-screen{flex:1;display:none;flex-direction:column;height:100dvh}
  header.bar{
    background:var(--cobalt);color:var(--sand);
    padding:16px 18px;display:flex;align-items:center;gap:12px;
    position:relative;overflow:hidden;flex-shrink:0;
    box-shadow:0 2px 12px rgba(14,37,72,.25);z-index:3;
  }
  header.bar .star{width:30px;height:30px;flex-shrink:0;position:relative;z-index:2}
  header.bar .h-name{font-weight:700;font-size:18px;position:relative;z-index:2}
  header.bar .h-name span{color:var(--gold)}
  header.bar .h-loc{font-size:12px;color:#bccbe2;position:relative;z-index:2}
  header.bar .switch{margin-left:auto;position:relative;z-index:2;background:rgba(255,255,255,.1);border:none;color:var(--sand);font-size:13px;padding:7px 12px;border-radius:9px;cursor:pointer}
  header.bar .switch:active{background:rgba(255,255,255,.2)}

  #feed{flex:1;overflow-y:auto;padding:20px 16px 8px;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:86%;padding:13px 15px;border-radius:16px;font-size:15.5px;line-height:1.55;word-wrap:break-word;white-space:pre-wrap}
  .msg.bot{background:var(--paper);border:1px solid var(--sand-deep);border-bottom-left-radius:5px;align-self:flex-start;box-shadow:0 1px 4px rgba(34,32,27,.05)}
  .msg.me{background:var(--cobalt);color:var(--sand);border-bottom-right-radius:5px;align-self:flex-end}
  .msg.bot strong{color:var(--clay)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:4px 16px 14px}
  .chip{background:var(--sand-deep);border:1px solid #d8c9a6;color:var(--cobalt-deep);font-size:13.5px;padding:9px 13px;border-radius:20px;cursor:pointer;font-weight:500}
  .chip:active{background:var(--gold);color:#fff}
  .typing{align-self:flex-start;display:flex;gap:5px;padding:14px 16px}
  .typing span{width:8px;height:8px;border-radius:50%;background:var(--turq);animation:bounce 1.1s infinite}
  .typing span:nth-child(2){animation-delay:.18s}
  .typing span:nth-child(3){animation-delay:.36s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}

  footer.compose{flex-shrink:0;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:var(--paper);border-top:1px solid var(--sand-deep);display:flex;gap:10px;align-items:flex-end}
  #input{flex:1;border:1px solid #d8c9a6;background:#fff;border-radius:18px;padding:12px 15px;font-size:15.5px;font-family:inherit;resize:none;max-height:110px;line-height:1.4;outline:none}
  #input:focus{border-color:var(--turq)}
  #send{flex-shrink:0;width:46px;height:46px;border-radius:50%;border:none;background:var(--clay);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #send:active{background:#a8542f}
  #send:disabled{opacity:.45}

  .feed-photo{max-width:86%;align-self:flex-start;border-radius:14px;overflow:hidden;border:1px solid var(--sand-deep)}
  .feed-photo img{width:100%;display:block}
  .feed-photo .cap{font-size:12.5px;color:var(--ink-soft);padding:7px 11px;background:var(--paper)}
</style>
</head>
<body>
<div id="app">

  <!-- ====== LANGUAGE SCREEN ====== -->
  <section id="lang-screen">
    <svg class="girih" style="width:340px;top:-60px;right:-90px" viewBox="0 0 100 100"><path fill="#fff" d="M50 2l12 24 27 4-19 19 4 27-24-12-24 12 4-27L17 30l27-4z"/></svg>
    <svg class="girih" style="width:200px;bottom:120px;left:-60px" viewBox="0 0 100 100"><path fill="#fff" d="M50 2l12 24 27 4-19 19 4 27-24-12-24 12 4-27L17 30l27-4z"/></svg>
    <div class="top">
      <div class="brand">
        <svg class="brand-star" viewBox="0 0 100 100"><path fill="#cfa24c" d="M50 3l11.5 23.3 25.7 3.7-18.6 18.1 4.4 25.6L50 64.6 27 76.8l4.4-25.6L12.8 30l25.7-3.7z"/></svg>
        <div class="brand-name">Uz<span>Gid</span></div>
      </div>
      <div class="lede">Your local guide to <em>Uzbekistan</em></div>
      <div class="sub">Ask anything — what to see, where to eat, how to get there. Photos and maps included.</div>
      <div class="pick">Choose your language</div>
    </div>
    <div class="langs" id="lang-grid"></div>
  </section>

  <!-- ====== CHAT SCREEN ====== -->
  <section id="chat-screen">
    <header class="bar">
      <svg class="girih" style="width:130px;top:-30px;right:-20px" viewBox="0 0 100 100"><path fill="#fff" d="M50 2l12 24 27 4-19 19 4 27-24-12-24 12 4-27L17 30l27-4z"/></svg>
      <svg class="star" viewBox="0 0 100 100"><path fill="#cfa24c" d="M50 3l11.5 23.3 25.7 3.7-18.6 18.1 4.4 25.6L50 64.6 27 76.8l4.4-25.6L12.8 30l25.7-3.7z"/></svg>
      <div>
        <div class="h-name">Uz<span>Gid</span> <span style="font-size:10px;color:#7fa;opacity:.8">v7</span></div>
        <div class="h-loc">AI guide · live</div>
      </div>
      <button class="switch" onclick="resetToLang()">Language</button>
    </header>
    <div id="feed"></div>
    <div class="chips" id="chips"></div>
    <footer class="compose">
      <textarea id="input" rows="1" placeholder="Ask your guide…"></textarea>
      <button id="send" onclick="onSend()">➤</button>
    </footer>
  </section>

</div>

<script>
function showError(msg){
  const f=document.getElementById('feed')||document.body;
  const d=document.createElement('div');
  d.style.cssText='align-self:center;max-width:92%;font-size:12.5px;color:#fff;background:#b3261e;border-radius:10px;padding:9px 13px;margin:6px auto;text-align:center;white-space:pre-wrap';
  d.textContent='⛔ '+msg;
  f.appendChild(d);
}
window.addEventListener('error',e=>{showError('JS error: '+e.message+'  @'+(e.lineno||'?'));});
window.addEventListener('unhandledrejection',e=>{showError('async error: '+(e.reason&&e.reason.message||e.reason));});

const LANGS = [
  {code:'en',flag:'🇬🇧',name:'English'},
  {code:'ru',flag:'🇷🇺',name:'Русский'},
  {code:'uz',flag:'🇺🇿',name:"O'zbekcha"},
  {code:'es',flag:'🇪🇸',name:'Español'},
  {code:'ko',flag:'🇰🇷',name:'한국어'},
  {code:'ja',flag:'🇯🇵',name:'日本語'},
  {code:'fr',flag:'🇫🇷',name:'Français'},
  {code:'de',flag:'🇩🇪',name:'Deutsch'},
];

const STARTERS = {
  en:["What to see in Samarkand?","Best plov in Tashkent","Tell me about the Registan","Taxi from the airport?"],
  ru:["Что посмотреть в Самарканде?","Лучший плов в Ташкенте","Расскажи про Регистан","Такси из аэропорта?"],
  uz:["Samarqandda nima ko'rish kerak?","Toshkentda eng mazali palov","Registon haqida ayting","Aeroportdan taksi?"],
  es:["¿Qué ver en Samarcanda?","Mejor plov en Taskent","Háblame del Registán","¿Taxi del aeropuerto?"],
  ko:["사마르칸트 볼거리?","타슈켄트 최고의 플롭","레기스탄에 대해 알려줘","공항에서 택시?"],
  ja:["サマルカンドの見どころは？","タシュケントの絶品プロフ","レギスタンについて教えて","空港からタクシーは？"],
  fr:["Que voir à Samarcande ?","Meilleur plov à Tachkent","Parlez-moi du Registan","Taxi de l'aéroport ?"],
  de:["Was in Samarkand sehen?","Bester Plov in Taschkent","Erzähl vom Registan","Taxi vom Flughafen?"],
};

const WELCOME = {
  en:"Salam! 👋 I'm your personal guide to Uzbekistan. Ask me anything about places, food, history or getting around — I'll add photos and a map pin when it helps.",
  ru:"Салам! 👋 Я ваш личный гид по Узбекистану. Спрашивайте о местах, еде, истории или как добраться — я добавлю фото и точку на карте, когда это поможет.",
  uz:"Salom! 👋 Men sizning O'zbekiston bo'yicha shaxsiy gidingizman. Joylar, taomlar, tarix yoki yo'l haqida so'rang.",
  es:"¡Salam! 👋 Soy tu guía personal de Uzbekistán. Pregúntame sobre lugares, comida, historia o cómo moverte.",
  ko:"살람! 👋 저는 당신의 우즈베키스탄 개인 가이드입니다. 장소, 음식, 역사, 이동 방법 등 무엇이든 물어보세요.",
  ja:"サラーム！👋 私はあなたのウズベキスタン専属ガイドです。場所、食べ物、歴史、移動方法など何でも聞いてください。",
  fr:"Salam ! 👋 Je suis votre guide personnel de l'Ouzbékistan. Demandez-moi tout sur les lieux, la cuisine, l'histoire.",
  de:"Salam! 👋 Ich bin Ihr persönlicher Usbekistan-Guide. Fragen Sie mich zu Orten, Essen, Geschichte oder Anreise.",
};

const LANGNAME = {en:'English',ru:'Russian',uz:'Uzbek',es:'Spanish',ko:'Korean',ja:'Japanese',fr:'French',de:'German'};

let lang='en';
let history=[];

// build language grid
const grid=document.getElementById('lang-grid');
LANGS.forEach(l=>{
  const b=document.createElement('button');
  b.className='lang-btn';
  b.innerHTML=`<span class="flag">${l.flag}</span>${l.name}`;
  b.onclick=()=>startChat(l.code);
  grid.appendChild(b);
});

function startChat(code){
  lang=code;
  history=[];
  document.getElementById('lang-screen').style.display='none';
  document.getElementById('chat-screen').style.display='flex';
  document.getElementById('feed').innerHTML='';
  addBot(WELCOME[code]||WELCOME.en);
  renderChips();
  document.getElementById('input').placeholder =
    code==='ru'?'Спросите гида…':code==='uz'?'Gidga savol bering…':'Ask your guide…';
}

function resetToLang(){
  document.getElementById('chat-screen').style.display='none';
  document.getElementById('lang-screen').style.display='flex';
}

function renderChips(){
  const box=document.getElementById('chips');
  box.innerHTML='';
  (STARTERS[lang]||STARTERS.en).forEach(s=>{
    const c=document.createElement('button');
    c.className='chip';c.textContent=s;
    c.onclick=()=>{document.getElementById('input').value=s;onSend();};
    box.appendChild(c);
  });
}

function addBot(text){
  const f=document.getElementById('feed');
  const d=document.createElement('div');
  d.className='msg bot';
  d.innerHTML=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  f.appendChild(d);f.scrollTop=f.scrollHeight;
}
function addMe(text){
  const f=document.getElementById('feed');
  const d=document.createElement('div');
  d.className='msg me';d.textContent=text;
  f.appendChild(d);f.scrollTop=f.scrollHeight;
}
function addPhoto(url,cap){
  const f=document.getElementById('feed');
  const d=document.createElement('div');
  d.className='feed-photo';
  d.innerHTML=`<img src="${url}" alt="${cap}"><div class="cap">📍 ${cap}</div>`;
  f.appendChild(d);f.scrollTop=f.scrollHeight;
}
function showTyping(){
  const f=document.getElementById('feed');
  const t=document.createElement('div');
  t.className='typing';t.id='typing';
  t.innerHTML='<span></span><span></span><span></span>';
  f.appendChild(t);f.scrollTop=f.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function addStatus(text){
  const f=document.getElementById('feed');
  const d=document.createElement('div');
  d.style.cssText='align-self:center;max-width:90%;text-align:center;font-size:13px;color:#8a5a2b;background:#fbe8d4;border:1px solid #e8c98f;border-radius:10px;padding:8px 12px';
  d.textContent='ℹ️ '+text;
  f.appendChild(d);f.scrollTop=f.scrollHeight;
}

async function fetchPhoto(q){
  // спрашиваем у нашей же серверной прослойки — она ходит в Википедию.
  // таймаут 9с, чтобы запрос не мог зависнуть молча.
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),9000);
    const r=await fetch('/api/photo?q='+encodeURIComponent(q),{signal:ctrl.signal});
    clearTimeout(timer);
    if(!r.ok)return {url:null,reason:'proxy http '+r.status};
    const d=await r.json();
    return {url:d.url||null,reason:d.reason||null};
  }catch(e){
    return {url:null,reason:'proxy unreachable: '+(e&&e.message||e)};
  }
}

const input=document.getElementById('input');
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,110)+'px';});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();onSend();}});

async function onSend(){
  const text=input.value.trim();
  if(!text)return;
  document.getElementById('chips').innerHTML='';
  addMe(text);
  input.value='';input.style.height='auto';
  history.push({role:'user',content:text});
  document.getElementById('send').disabled=true;
  showTyping();

  const system=`You are UzGid, an expert local tour guide for Uzbekistan (Tashkent, Samarkand, Bukhara, Khiva and beyond). Reply ONLY in ${LANGNAME[lang]}. Be warm, lively and concise like a real local guide — 2 to 4 short paragraphs. Give concrete places, dish names, realistic price ranges in UZS and USD, and practical tips. If unsure about a specific local detail, say so honestly rather than inventing it. Decline questions unrelated to travel in Uzbekistan. On the VERY LAST line output: PHOTO: <the single most famous place name, short, as Wikipedia would title it, e.g. "Registan" or "Bibi-Khanym Mosque"> or PHOTO: none`;

  try{
    const resp=await fetch("/api/chat",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:system,messages:history})
    });
    const data=await resp.json();
    let answer=data.content?.[0]?.text||"…";
    history.push({role:'assistant',content:answer});

    let photoQ=null;
    const m=answer.match(/PHOTO:\s*([^\n]+)/i);
    if(m){if(m[1].trim().toLowerCase()!=='none')photoQ=m[1].trim();}
    answer=answer.replace(/\n?\s*PHOTO:\s*[^\n]*/i,'').trim();

    hideTyping();
    addBot(answer);
    if(photoQ){
      const res=await fetchPhoto(photoQ);
      if(res.url){addPhoto(res.url,photoQ);}
      else{addStatus('Фото не найдено · '+res.reason);}
    }else{
      addStatus('Модель не указала место (нет метки PHOTO)');
    }
  }catch(e){
    hideTyping();
    showError('onSend failed: '+(e&&e.message||e));
  }
  document.getElementById('send').disabled=false;
}
</script>
</body>
</html>
