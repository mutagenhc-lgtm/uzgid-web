<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>UzGid — your guide to Uzbekistan</title>
<style>
  :root{
    --cobalt:#15356b;
    --cobalt-deep:#0e2548;
    --turq:#1f8f93;
    --turq-light:#3bb3a8;
    --sand:#f4ecd8;
    --sand-deep:#e9dcc0;
    --clay:#c0633a;
    --gold:#cfa24c;
    --ink:#22201b;
    --ink-soft:#5b554a;
    --paper:#fbf6ea;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--sand);
    color:var(--ink);
    overflow:hidden;
  }
  #app{display:flex;flex-direction:column;height:100dvh;max-width:520px;margin:0 auto;position:relative;background:var(--paper)}

  /* ---------- shared girih motif ---------- */
  .girih{position:absolute;opacity:.07;pointer-events:none}

  /* ---------- language screen ---------- */
  #lang-screen{
    flex:1;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#0a1f3f 0%,#15356b 45%,#1f3a6b 100%);
    color:var(--sand);
    position:relative;overflow:hidden;
  }
  #lang-screen .hero-art{position:absolute;right:-40px;bottom:0;width:60%;max-width:340px;height:auto;
    z-index:1;opacity:0;animation:risein 1.2s ease-out 0.3s forwards;
    filter:drop-shadow(0 4px 18px rgba(207,162,76,0.25))}
  @keyframes risein{from{opacity:0;transform:translateY(40px)}to{opacity:0.85;transform:translateY(0)}}
  #lang-screen .bg-tile{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;opacity:0.7}
  #lang-screen .sunset{position:absolute;left:0;right:0;bottom:0;height:55%;
    background:radial-gradient(ellipse at 50% 100%,rgba(207,162,76,0.35) 0%,rgba(207,162,76,0.12) 35%,transparent 70%);
    pointer-events:none;z-index:2}
  #lang-screen .stars{position:absolute;inset:0;pointer-events:none;z-index:3}
  #lang-screen .stars .s{position:absolute;width:3px;height:3px;border-radius:50%;background:#cfa24c;
    box-shadow:0 0 8px #cfa24c;animation:twinkle 3.2s infinite ease-in-out}
  #lang-screen .stars .s1{top:8%;left:18%;animation-delay:0s}
  #lang-screen .stars .s2{top:14%;left:72%;animation-delay:0.6s}
  #lang-screen .stars .s3{top:22%;left:40%;animation-delay:1.2s}
  #lang-screen .stars .s4{top:5%;left:88%;animation-delay:1.8s;width:2px;height:2px}
  #lang-screen .stars .s5{top:18%;left:8%;animation-delay:2.4s;width:2px;height:2px}
  @keyframes twinkle{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
  @keyframes slidein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  #lang-screen .top{padding:54px 28px 10px;position:relative;z-index:3}
  .brand{display:flex;align-items:center;gap:12px;margin-bottom:22px;opacity:0;animation:slidein 0.6s ease-out 0.3s forwards}
  .brand-star{width:38px;height:38px;flex-shrink:0;filter:drop-shadow(0 0 12px rgba(207,162,76,0.5));animation:starpulse 3s infinite ease-in-out}
  @keyframes starpulse{0%,100%{filter:drop-shadow(0 0 8px rgba(207,162,76,0.4))}50%{filter:drop-shadow(0 0 18px rgba(207,162,76,0.85))}}
  .brand-name{font-size:25px;font-weight:700;letter-spacing:.5px}
  .brand-name span{color:var(--gold)}
  .lede{font-size:30px;line-height:1.25;font-weight:600;max-width:11ch;opacity:0;animation:slidein 0.6s ease-out 0.5s forwards}
  .lede em{font-style:normal;color:var(--turq-light)}
  .sub{margin-top:14px;font-size:15px;line-height:1.6;color:#cdd8ea;max-width:30ch;opacity:0;animation:slidein 0.6s ease-out 0.65s forwards}
  .pick{margin-top:26px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:0;animation:slidein 0.6s ease-out 0.8s forwards}
  .langs{
    position:relative;z-index:3;
    padding:14px 22px 150px;
    display:grid;grid-template-columns:1fr 1fr;gap:11px;
    overflow-y:auto;
  }
  .lang-btn{
    display:flex;align-items:center;gap:11px;
    background:rgba(15,30,60,0.55);
    border:1px solid rgba(207,162,76,.35);
    border-radius:14px;padding:14px 15px;
    color:var(--sand);font-size:15.5px;font-weight:500;
    cursor:pointer;transition:transform .25s,background .25s,border-color .25s,box-shadow .25s;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    position:relative;overflow:hidden;
    opacity:0;animation:slidein 0.5s ease-out forwards;
  }
  .lang-btn:nth-child(1){animation-delay:0.6s}
  .lang-btn:nth-child(2){animation-delay:0.7s}
  .lang-btn:nth-child(3){animation-delay:0.8s}
  .lang-btn:nth-child(4){animation-delay:0.9s}
  .lang-btn:nth-child(5){animation-delay:1.0s}
  .lang-btn:nth-child(6){animation-delay:1.1s}
  .lang-btn:nth-child(7){animation-delay:1.2s}
  .lang-btn:nth-child(8){animation-delay:1.3s}
  .lang-btn:nth-child(9){animation-delay:1.4s}
  .lang-btn::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;
    background:linear-gradient(120deg,transparent,rgba(207,162,76,0.18),transparent);
    transform:skewX(-20deg);pointer-events:none;
    transition:left 0.7s ease}
  .lang-btn:hover{background:var(--turq);border-color:var(--gold);transform:translateY(-2px) scale(1.02);
    box-shadow:0 8px 20px rgba(31,143,147,0.35),0 0 0 1px rgba(207,162,76,0.5) inset}
  .lang-btn:hover::before{left:120%}
  .lang-btn:active{transform:translateY(0) scale(0.98)}
  .lang-btn .flag{font-size:22px;transition:transform 0.3s}
  .lang-btn:hover .flag{transform:scale(1.2) rotate(-5deg)}

  /* ---------- chat screen ---------- */
  #chat-screen{flex:1;display:none;flex-direction:column;height:100dvh}
  header.bar{
    background:var(--cobalt);color:var(--sand);
    padding:16px 18px;display:flex;align-items:center;gap:12px;
    position:relative;overflow:hidden;flex-shrink:0;
    box-shadow:0 2px 12px rgba(14,37,72,.25);z-index:3;
  }
  header.bar .star{width:30px;height:30px;flex-shrink:0;position:relative;z-index:2}
  header.bar .h-name{font-weight:700;font-size:18px;position:relative;z-index:2}
  header.bar .h-name span{color:var(--gold)}
  header.bar .h-loc{font-size:12px;color:#bccbe2;position:relative;z-index:2}
  header.bar .switch{margin-left:auto;position:relative;z-index:2;background:rgba(255,255,255,.1);border:none;color:var(--sand);font-size:13px;padding:7px 12px;border-radius:9px;cursor:pointer}
  header.bar .switch:active{background:rgba(255,255,255,.2)}

  #feed{flex:1;overflow-y:auto;padding:20px 16px 8px;display:flex;flex-direction:column;gap:14px}
  .msg{max-width:86%;padding:13px 15px;border-radius:16px;font-size:15.5px;line-height:1.55;word-wrap:break-word;white-space:pre-wrap}
  .msg.bot{background:var(--paper);border:1px solid var(--sand-deep);border-bottom-left-radius:5px;align-self:flex-start;box-shadow:0 1px 4px rgba(34,32,27,.05)}
  .msg.me{background:var(--cobalt);color:var(--sand);border-bottom-right-radius:5px;align-self:flex-end}
  .msg.bot strong{color:var(--clay)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;padding:4px 16px 14px}
  .chip{background:var(--sand-deep);border:1px solid #d8c9a6;color:var(--cobalt-deep);font-size:13.5px;padding:9px 13px;border-radius:20px;cursor:pointer;font-weight:500}
  .chip:active{background:var(--gold);color:#fff}
  .typing{align-self:flex-start;display:flex;gap:5px;padding:14px 16px}
  .typing span{width:8px;height:8px;border-radius:50%;background:var(--turq);animation:bounce 1.1s infinite}
  .typing span:nth-child(2){animation-delay:.18s}
  .typing span:nth-child(3){animation-delay:.36s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-6px);opacity:1}}

  footer.compose{flex-shrink:0;padding:12px 14px calc(12px + env(safe-area-inset-bottom));background:var(--paper);border-top:1px solid var(--sand-deep);display:flex;gap:10px;align-items:flex-end}
  #input{flex:1;border:1px solid #d8c9a6;background:#fff;border-radius:18px;padding:12px 15px;font-size:15.5px;font-family:inherit;resize:none;max-height:110px;line-height:1.4;outline:none}
  #input:focus{border-color:var(--turq)}
  #send{flex-shrink:0;width:46px;height:46px;border-radius:50%;border:none;background:var(--clay);color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  #send:active{background:#a8542f}
  #send:disabled{opacity:.45}

  .feed-photo{width:86%;max-width:380px;align-self:flex-start;border-radius:14px;overflow:hidden;border:1px solid var(--sand-deep);background:var(--paper)}
  .feed-photo img{width:100%;min-height:120px;display:block;object-fit:cover}
  .feed-photo .cap{font-size:12.5px;color:var(--ink-soft);padding:7px 11px;background:var(--paper)}
</style>
</head>
<body>
<div id="app">

  <!-- ====== LANGUAGE SCREEN ====== -->
  <section id="lang-screen">
    <!-- Иллюстрация минарета Калян: высокий силуэт с орнаментальными поясами -->
    <svg class="hero-art" viewBox="0 0 400 600" preserveAspectRatio="xMidYMax slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>

          <stop offset="0%" stop-color="#5a3a22"/>

        </linearGradient>
        <radialGradient id="lantern-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#ffd97a" stop-opacity="0.9"/>
          <stop offset="60%" stop-color="#cfa24c" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#cfa24c" stop-opacity="0"/>
        </radialGradient>

          <circle cx="222" cy="341" r="3"/>
        </g>
        <rect x="162" y="380" width="76" height="14" fill="url(#brick-light)"/>
        <rect x="160" y="420" width="80" height="22" fill="url(#brick-light)"/>
        <path d="M160 426 L240 426 M160 432 L240 432 M160 438 L240 438"/>
        <rect x="158" y="475" width="84" height="14" fill="url(#brick-light)"/>
        <rect x="155" y="520" width="90" height="24" fill="url(#brick-light)"/>
        <g stroke="#cfa24c" stroke-width="0.7">
          <path d="M165 532 L165 526 L171 526 L171 532 M177 532 L177 526 L183 526 L183 532 M189 532 L189 526 L195 526 L195 532 M201 532 L201 526 L207 526 L207 532 M213 532 L213 526 L219 526 L219 532 M225 532 L225 526 L231 526 L231 532"/>
        </g>
      </g>

      <!-- основание с арками -->
      <rect x="148" y="555" width="104" height="45" fill="#2a1810"/>
      <path d="M160 600 L160 580 Q170 568 180 580 L180 600 Z" fill="#15356b"/>
      <path d="M195 600 L195 575 Q205 562 215 575 L215 600 Z" fill="#15356b"/>
      <path d="M230 600 L230 580 Q240 568 250 580 L250 600 Z" fill="#15356b"/>

      <!-- фонарь (галерея муэдзина) сверху -->
      <ellipse cx="200" cy="135" rx="35" ry="10" fill="#2a1810"/>
      <rect x="175" y="105" width="50" height="30" fill="#3d2817"/>
      <!-- арочные окна фонаря с золотым светом -->
      <g fill="#cfa24c">
        <path d="M180 130 L180 118 Q183 113 186 118 L186 130 Z"/>
        <path d="M192 130 L192 118 Q195 113 198 118 L198 130 Z"/>
        <path d="M204 130 L204 118 Q207 113 210 118 L210 130 Z"/>

    <!-- мозаичный фон-сетка с гирихом, повторяющийся узор -->
    <svg class="bg-tile" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" aria-hidden="true">
      <defs>
        <pattern id="girih" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
          <path d="M40 6l8 18 19 3-13 13 3 19-17-9-17 9 3-19-13-13 19-3z" fill="none" stroke="#3bb3a8" stroke-width="0.8" opacity="0.45"/>

      <span class="s s1"></span><span class="s s2"></span><span class="s s3"></span>
      <span class="s s4"></span><span class="s s5"></span>

    <div class="top">
      <div class="brand">

        <div class="brand-name">Uz<span>Gid</span></div>
      </div>
      <div class="lede">Your local guide to <em>Uzbekistan</em></div>

      <div class="pick">Choose your language</div>

  <!-- ====== CHAT SCREEN ====== -->
  <section id="chat-screen">
    <header class="bar">
      <svg class="girih" style="width:130px;top:-30px;right:-20px" viewBox="0 0 100 100"><path fill="#fff" d="M50 2l12 24 27 4-19 19 4 27-24-12-24 12 4-27L17 30l27-4z"/></svg>
      <svg class="star" viewBox="0 0 100 100"><path fill="#cfa24c" d="M50 3l11.5 23.3 25.7 3.7-18.6 18.1 4.4 25.6L50 64.6 27 76.8l4.4-25.6L12.8 30l25.7-3.7z"/></svg>
      <div>
        <div class="h-name">Uz<span>Gid</span> <span style="font-size:10px;color:#7fa;opacity:.8">v38</span></div>
        <div class="h-loc">AI guide · live</div>
      </div>
      <button class="switch" onclick="resetToLang()">Language</button>
    </header>
    <div id="feed"></div>
    <div class="chips" id="chips"></div>
    <footer class="compose">
      <button id="camera" onclick="document.getElementById('photo-input').click()" style="flex-shrink:0;width:46px;height:46px;border-radius:50%;border:1px solid #d8c9a6;background:#fbf6ea;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center" title="Распознать фото">📷</button>
      <input id="photo-input" type="file" accept="image/*" capture="environment" style="display:none" onchange="onPhotoPicked(event)">
      <textarea id="input" rows="1" placeholder="Ask your guide…"></textarea>
      <button id="send" onclick="onSend()">➤</button>
    </footer>
  </section>

</div>

<script>
function showError(msg){
  const f=document.getElementById('feed')||document.body;
  const d=document.createElement('div');
  d.style.cssText='align-self:center;max-width:92%;font-size:12.5px;color:#fff;background:#b3261e;border-radius:10px;padding:9px 13px;margin:6px auto;text-align:center;white-space:pre-wrap';
  d.textContent='⛔ '+msg;
  f.appendChild(d);
}
window.addEventListener('error',e=>{showError('JS error: '+e.message+'  @'+(e.lineno||'?'));});
window.addEventListener('unhandledrejection',e=>{showError('async error: '+(e.reason&&e.reason.message||e.reason));});

const LANGS = [
  {code:'en',flag:'🇬🇧',name:'English'},
  {code:'ru',flag:'🇷🇺',name:'Русский'},

  {code:'fr',flag:'🇫🇷',name:'Français'},
  {code:'de',flag:'🇩🇪',name:'Deutsch'},
  {code:'zh',flag:'🇨🇳',name:'中文'},
];

  zh:"你好！👋 我是您的乌兹别克斯坦私人导游。无论是景点、美食、历史还是出行，尽管问我，我会附上照片帮助理解。",
};

const LANGNAME = {en:'English',ru:'Russian',uz:'Uzbek',es:'Spanish',ko:'Korean',ja:'Japanese',fr:'French',de:'German',zh:'Chinese (Simplified)'};

let lang='en';
let history=[];

// build language grid
const grid=document.getElementById('lang-grid');
LANGS.forEach(l=>{
  const b=document.createElement('button');
  b.className='lang-btn';
  b.innerHTML=`<span class="flag">${l.flag}</span>${l.name}`;
  b.onclick=()=>startChat(l.code);
  grid.appendChild(b);
});

function startChat(code){
  lang=code;
  history=[];
  document.getElementById('lang-screen').style.display='none';
  document.getElementById('chat-screen').style.display='flex';
  document.getElementById('feed').innerHTML='';
  addBot(WELCOME[code]||WELCOME.en);
  renderChips();
  document.getElementById('input').placeholder =
    code==='ru'?'Спросите гида…':code==='uz'?'Gidga savol bering…':'Ask your guide…';
}

function resetToLang(){
  document.getElementById('chat-screen').style.display='none';
  document.getElementById('lang-screen').style.display='flex';
}

function renderChips(){
  const box=document.getElementById('chips');
  box.innerHTML='';
  (STARTERS[lang]||STARTERS.en).forEach(s=>{
    const c=document.createElement('button');
    c.className='chip';c.textContent=s;
    c.onclick=()=>{document.getElementById('input').value=s;onSend();};
    box.appendChild(c);
  });
}

function addBot(text,model,route){
  const f=document.getElementById('feed');
  const d=document.createElement('div');
  d.className='msg bot';
  d.innerHTML=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  if(model){
    const isG=model==='gemini';
    const badge=document.createElement('span');
    badge.textContent=isG?'G':'C';
    badge.title=route?('Маршрут: '+route):(isG?'Ответил Gemini':'Ответил Claude');
    badge.style.cssText='display:inline-block;margin-right:8px;width:20px;height:20px;line-height:20px;text-align:center;border-radius:50%;font-size:11px;font-weight:700;color:#fff;background:'+(isG?'#1f8f93':'#15356b');
    d.insertBefore(badge,d.firstChild);
    if(route){
      const tag=document.createElement('span');
      tag.textContent=route;
      tag.style.cssText='display:inline-block;margin-right:6px;font-size:9.5px;color:#888;font-family:monospace;background:#f4ecd8;padding:1px 5px;border-radius:6px;vertical-align:middle';
      d.insertBefore(tag,d.firstChild.nextSibling);
    }
  }
  f.appendChild(d);f.scrollTop=f.scrollHeight;
  return d;
}
function addMe(text){
  const f=document.getElementById('feed');
  const d=document.createElement('div');
  d.className='msg me';d.textContent=text;
  f.appendChild(d);f.scrollTop=f.scrollHeight;
}
function addPhoto(src,cap){
  const f=document.getElementById('feed');
  const d=document.createElement('div');
  d.className='feed-photo';
  const img=document.createElement('img');
  img.alt=cap;img.src=src;
  d.appendChild(img);
  const c=document.createElement('div');
  c.className='cap';c.textContent='📍 '+cap;
  d.appendChild(c);
  f.appendChild(d);f.scrollTop=f.scrollHeight;
}
function showTyping(){
  const f=document.getElementById('feed');
  const t=document.createElement('div');
  t.className='typing';t.id='typing';
  t.innerHTML='<span></span><span></span><span></span>';
  f.appendChild(t);f.scrollTop=f.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function addFeedback(bubble,question,answer){
  const row=document.createElement('div');
  row.style.cssText='display:flex;gap:8px;margin-top:10px;padding-top:8px;border-top:1px dashed #e0d3b3';
  const mk=(emoji,rating,label)=>{
    const b=document.createElement('button');
    b.type='button';b.textContent=emoji;b.title=label;
    b.style.cssText='background:#fff;border:1px solid #e0d3b3;border-radius:18px;width:34px;height:30px;font-size:15px;cursor:pointer;padding:0;font-family:inherit';
    b.onclick=async()=>{
      row.innerHTML='<span style="font-size:12px;color:#5b554a">'+(rating==='up'?'спасибо за оценку 🙏':'учтём и улучшим')+'</span>';
      try{
        await fetch('/api/feedback',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({question,answer,rating,lang})
        });
      }catch(e){/* тихо: оценка не критична для UX */}
    };
    return b;
  };
  row.appendChild(mk('👍','up','хороший ответ'));
  row.appendChild(mk('👎','down','неточный ответ'));
  bubble.appendChild(row);
}

function addLocation(name,lat,lon){
  const f=document.getElementById('feed');
  const card=document.createElement('button');
  card.type='button';
  card.style.cssText='align-self:flex-start;width:86%;max-width:380px;display:flex;align-items:center;gap:12px;background:#fbf6ea;border:1px solid #e9dcc0;border-radius:14px;padding:11px 13px;text-align:left;cursor:pointer;font-family:inherit;color:#22201b';
  const pin=document.createElement('div');
  pin.style.cssText='width:42px;height:42px;border-radius:50%;background:#15356b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0';
  pin.textContent='📍';
  card.appendChild(pin);
  const info=document.createElement('div');
  info.style.cssText='flex:1;min-width:0';
  info.innerHTML='<div style="font-weight:600;font-size:14.5px">'+name+'</div>'+
    '<div style="font-size:12px;color:#1f8f93">Открыть на карте →</div>';
  card.appendChild(info);
  card.onclick=()=>openMapChooser(name,lat,lon);
  f.appendChild(card);
}

function openMapChooser(name,lat,lon){
  // определяем платформу для подсказки «по умолчанию»
  const ua=navigator.userAgent||'';
  const isIOS=/iPhone|iPad|iPod/.test(ua);
  const isAndroid=/Android/.test(ua);
  const q=encodeURIComponent(name);

  // список вариантов: метка, ссылка
  const opts=[];
  if(isIOS){
    opts.push(['🗺️ Apple Maps','maps://?ll='+lat+','+lon+'&q='+q]);
  }
  opts.push(['🟢 Google Maps','https://www.google.com/maps/search/?api=1&query='+lat+','+lon]);
  opts.push(['🟡 Яндекс.Карты','https://yandex.com/maps/?pt='+lon+','+lat+'&z=16&l=map']);
  opts.push(['🔵 2GIS','https://2gis.uz/geo/'+lon+','+lat]);
  opts.push(['🌍 OpenStreetMap','https://www.openstreetmap.org/?mlat='+lat+'&mlon='+lon+'#map=16/'+lat+'/'+lon]);

  // полупрозрачный фон
  const back=document.createElement('div');
  back.style.cssText='position:fixed;inset:0;background:rgba(14,37,72,.55);z-index:100;display:flex;align-items:flex-end;justify-content:center';
  back.onclick=(e)=>{if(e.target===back)back.remove();};

  // сам выезжающий лист
  const sheet=document.createElement('div');
  sheet.style.cssText='width:100%;max-width:520px;background:#fbf6ea;border-radius:18px 18px 0 0;padding:14px 14px calc(20px + env(safe-area-inset-bottom));box-shadow:0 -4px 20px rgba(0,0,0,.25)';
  const title=document.createElement('div');
  title.style.cssText='font-size:13px;color:#5b554a;text-align:center;padding:6px 0 12px';
  title.textContent='Открыть «'+name+'» в:';
  sheet.appendChild(title);
  opts.forEach(([label,url])=>{
    const b=document.createElement('a');
    b.href=url;b.target='_blank';b.rel='noopener';
    b.textContent=label;
    b.style.cssText='display:block;text-decoration:none;color:#22201b;background:#fff;border:1px solid #e9dcc0;border-radius:12px;padding:14px 16px;font-size:15.5px;margin-bottom:8px;font-weight:500';
    b.onclick=()=>setTimeout(()=>back.remove(),100);
    sheet.appendChild(b);
  });
  const cancel=document.createElement('button');
  cancel.type='button';cancel.textContent='Отмена';
  cancel.style.cssText='width:100%;background:transparent;border:none;color:#5b554a;font-size:15px;padding:10px;cursor:pointer;font-family:inherit;margin-top:4px';
  cancel.onclick=()=>back.remove();
  sheet.appendChild(cancel);
  back.appendChild(sheet);
  document.body.appendChild(back);
}

const input=document.getElementById('input');
input.addEventListener('input',()=>{input.style.height='auto';input.style.height=Math.min(input.scrollHeight,110)+'px';});
input.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();onSend();}});

async function attachPhotoAndMap(bubble,photoQ){
  const status=document.createElement('div');
  status.style.cssText='margin-top:8px;padding-top:7px;border-top:1px dashed #d8c9a6;font-size:12.5px;color:#8a5a2b';
  status.textContent='📷 ищу фото…';
  bubble.appendChild(status);
  bubble.parentElement.scrollTop=bubble.parentElement.scrollHeight;
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),15000);
    const r=await fetch('/api/photo?q='+encodeURIComponent(photoQ),{signal:ctrl.signal});
    clearTimeout(timer);
    const d=await r.json();
    let hadAnything=false;
    if(d.dataUrl){
      hadAnything=true;
      const f=document.getElementById('feed');
      const img=document.createElement('img');
      img.alt=photoQ;
      img.style.cssText='display:block;width:86%;max-width:380px;height:auto;align-self:flex-start;border-radius:14px;border:1px solid #e9dcc0;background:#fbf6ea';
      img.onload=function(){status.remove();};
      img.onerror=function(){status.textContent='📷 картинка не открывается';img.remove();};
      f.appendChild(img);
      const cap=document.createElement('div');
      cap.style.cssText='align-self:flex-start;font-size:12.5px;color:#5b554a;padding:0 4px;margin-top:-6px';
      cap.textContent='📍 '+photoQ;
      f.appendChild(cap);
      img.src=d.dataUrl;
    }
    if(d.lat&&d.lon){
      hadAnything=true;
      addLocation(photoQ,d.lat,d.lon);
      if(!d.dataUrl)status.remove();
    }
    if(!hadAnything){
      status.textContent='📷 '+(d.reason||'нет фото');
    }
    document.getElementById('feed').scrollTop=document.getElementById('feed').scrollHeight;
  }catch(e){
    status.textContent='📷 ошибка: '+(e&&e.name||'')+' '+(e&&e.message||e);
  }
}

const FREE_PHOTOS = 5;
function photosUsed(){
  try{return parseInt(localStorage.getItem('uzgid_photos_used')||'0',10);}catch(e){return 0;}
}
function bumpPhotosUsed(){
  try{localStorage.setItem('uzgid_photos_used',String(photosUsed()+1));}catch(e){}
}

async function onPhotoPicked(ev){
  const file=ev.target.files&&ev.target.files[0];
  ev.target.value=''; // чтобы можно было выбрать тот же файл повторно
  if(!file)return;

  // Пейволл: 5 бесплатных фото на устройство
  if(photosUsed()>=FREE_PHOTOS){
    showPaywall();
    return;
  }

  // Сжимаем картинку до ~1024px, чтобы быстро отправлялась и стоила дёшево
  const dataUrl=await compressImage(file,1024);
  if(!dataUrl){addBot('⚠️ Не удалось обработать фото');return;}

  // Показываем превью в ленте как сообщение от пользователя
  const f=document.getElementById('feed');
  const me=document.createElement('img');
  me.src=dataUrl;
  me.style.cssText='align-self:flex-end;max-width:55%;border-radius:14px;border:2px solid #15356b';
  f.appendChild(me);f.scrollTop=f.scrollHeight;

  document.getElementById('chips').innerHTML='';
  document.getElementById('send').disabled=true;
  showTyping();

  // Готовим сообщение в формате Anthropic vision
  const base64=dataUrl.replace(/^data:image\/\w+;base64,/,'');
  const mediaType=(dataUrl.match(/^data:(image\/\w+);/)||[])[1]||'image/jpeg';
  const visionMessage={
    role:'user',
    content:[
      {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
      {type:'text',text:'The tourist sent this photo from their trip in Uzbekistan. Identify the place, landmark, dish or object if you can, and tell them about it like a local guide. If you are not sure what it is, say so honestly and describe what you see.'},
    ],
  };
  history.push(visionMessage);

  const system="You are UzGid, an expert local tour guide for Uzbekistan. Reply ONLY in "+LANGNAME[lang]+". Be warm, lively, concise — 2–4 short paragraphs. If you recognize the place or dish in the photo, name it specifically and give concrete details. If unsure, say so honestly and describe what you see. On the very last line output: PHOTO: <main place name in English, Wikipedia-style> or PHOTO: none";

  try{
    const resp=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system,messages:history})
    });
    const data=await resp.json();
    let answer=data.content?.[0]?.text||'…';
    const model=data._model||'claude';
    const route=data._route||'';
    history.push({role:'assistant',content:answer});

    // Чтобы в следующих текстовых вопросах не тащить тяжёлую картинку
    if(history.length>=2)history[history.length-2].content='[sent a photo]';

    let photoQ=null;
    const m=answer.match(/PHOTO:\s*([^\n]+)/i);
    if(m&&m[1].trim().toLowerCase()!=='none')photoQ=m[1].trim();
    answer=answer.replace(/\n?\s*PHOTO:\s*[^\n]*/i,'').trim();

    hideTyping();
    const bubble=addBot(answer,model,route);
    addFeedback(bubble,'[photo]',answer);
    bumpPhotosUsed();

    if(photoQ){await attachPhotoAndMap(bubble,photoQ);}
  }catch(e){
    hideTyping();
    addBot('⚠️ '+(lang==='ru'?'Не удалось распознать фото.':'Could not analyse the photo.'));
  }
  document.getElementById('send').disabled=false;
}

function compressImage(file,maxSide){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const ratio=Math.min(1,maxSide/Math.max(img.width,img.height));
      const w=Math.round(img.width*ratio),h=Math.round(img.height*ratio);
      const c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',0.85));
    };
    img.onerror=()=>resolve(null);
    const r=new FileReader();
    r.onload=(e)=>{img.src=e.target.result;};
    r.onerror=()=>resolve(null);
    r.readAsDataURL(file);
  });
}

function showPaywall(){
  const back=document.createElement('div');
  back.style.cssText='position:fixed;inset:0;background:rgba(14,37,72,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px';
  back.onclick=(e)=>{if(e.target===back)back.remove();};
  const card=document.createElement('div');
  card.style.cssText='background:#fbf6ea;border-radius:18px;padding:22px;max-width:340px;width:100%;text-align:center';
  card.innerHTML=
    '<div style="font-size:42px;margin-bottom:8px">📷</div>'+
    '<div style="font-size:18px;font-weight:600;margin-bottom:8px">'+(lang==='ru'?'Лимит бесплатных фото':'Free photo limit')+'</div>'+
    '<div style="font-size:14px;color:#5b554a;margin-bottom:18px">'+(lang==='ru'?'Вы использовали 5 бесплатных распознаваний фото. Безлимитный доступ на всю поездку — $5.':'You used 5 free photo recognitions. Unlimited for your whole trip — $5.')+'</div>';
  const btn=document.createElement('button');
  btn.type='button';btn.textContent=lang==='ru'?'💳 Открыть доступ':'💳 Get unlimited';
  btn.style.cssText='width:100%;background:#c0633a;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px';
  btn.onclick=()=>{alert(lang==='ru'?'Оплата скоро будет доступна 🙏':'Payments coming soon 🙏');};
  card.appendChild(btn);
  const close=document.createElement('button');
  close.type='button';close.textContent=lang==='ru'?'Позже':'Later';
  close.style.cssText='width:100%;background:transparent;color:#5b554a;border:none;padding:8px;font-size:14px;cursor:pointer;font-family:inherit';
  close.onclick=()=>back.remove();
  card.appendChild(close);
  back.appendChild(card);
  document.body.appendChild(back);
}

async function onSend(){
  const text=input.value.trim();
  if(!text)return;
  document.getElementById('chips').innerHTML='';
  addMe(text);
  input.value='';input.style.height='auto';
  history.push({role:'user',content:text});
  document.getElementById('send').disabled=true;
  showTyping();

  const system=`You are UzGid, an expert local tour guide for Uzbekistan (Tashkent, Samarkand, Bukhara, Khiva and beyond). Reply ONLY in ${LANGNAME[lang]}. Be warm, lively and concise like a real local guide — 2 to 4 short paragraphs. Give concrete places, dish names, realistic price ranges in UZS and USD, and practical tips. If unsure about a specific local detail, say so honestly rather than inventing it. Decline questions unrelated to travel in Uzbekistan. VERY IMPORTANT: on the very last line, output the main place name ALWAYS IN ENGLISH (Latin script), exactly as English Wikipedia titles it, even though the rest of your reply is in ${LANGNAME[lang]}. Format: PHOTO: Registan  (or)  PHOTO: Bibi-Khanym Mosque  (or)  PHOTO: none`;

  try{
    const resp=await fetch("/api/chat",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:system,messages:history})
    });
    const data=await resp.json();
    let answer=data.content?.[0]?.text||"…";
    const model=data._model||"claude";
    const route=data._route||"";
    history.push({role:'assistant',content:answer});

    let photoQ=null;
    const m=answer.match(/PHOTO:\s*([^\n]+)/i);
    if(m){if(m[1].trim().toLowerCase()!=='none')photoQ=m[1].trim();}
    answer=answer.replace(/\n?\s*PHOTO:\s*[^\n]*/i,'').trim();

    hideTyping();
    const bubble=addBot(answer,model,route);
    addFeedback(bubble,text,answer);
    if(photoQ){await attachPhotoAndMap(bubble,photoQ);}
  }catch(e){
    hideTyping();
    addBot(lang==='ru'?'⚠️ Попробуйте ещё раз.':'⚠️ Please try again.');
  }
  document.getElementById('send').disabled=false;
}
</script>
